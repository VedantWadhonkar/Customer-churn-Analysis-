{% extends 'base.html' %}
{% block content %}

<div class="dashboard">
    <h2>Customer Churn Analysis</h2>

    <form method="POST" enctype="multipart/form-data" class="upload-box">
        <input type="file" name="file" required>
        <button class="btn">Upload Dataset</button>
    </form>

    {% if output %}
    <div class="result">
        <h3>Preview of Data</h3>
        {{ output|safe }}
    </div>
    {% endif %}
</div>

{% endblock %}
