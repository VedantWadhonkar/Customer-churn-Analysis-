{% extends 'base.html' %}
{% block content %}

<div class="center-box">
    <div class="glass-card">
        <h2>Reset Password</h2>

        <form method="POST">

            <!-- ✅ HIDDEN EMAIL (IMPORTANT) -->
            <input type="hidden" name="email" value="{{ email }}">

            <!-- Optional: show email -->
            <p class="info-text">Resetting password for: <b>{{ email }}</b></p>

            <input type="password"
                   name="new_password"
                   placeholder="New Password"
                   required>

            <input type="password"
                   name="confirm_password"
                   placeholder="Confirm Password"
                   required>

            <button class="btn">Update Password</button>
        </form>

        <p class="link">
            <a href="/login">Back to Login</a>
        </p>
    </div>
</div>

{% endblock %}
