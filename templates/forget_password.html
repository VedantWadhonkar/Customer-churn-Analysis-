{% extends 'base.html' %}
{% block content %}

<div class="center-box">
    <div class="glass-card">
        <h2>Forgot Password</h2>

        <form method="POST">

            <!-- ✅ EMAIL INPUT -->
            <input type="email"
                   name="email"
                   placeholder="Enter Registered Email"
                   required>

            <button class="btn">Send Reset Link</button>
        </form>

        <p class="link">
            Remember your password? <a href="/login">Login</a>
        </p>
    </div>
</div>

{% endblock %}
